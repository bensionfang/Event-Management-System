{% extends 'base.html' %}

{% block title %}登入 | 系辦活動系統{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto; padding: 2rem;">
    <h2 style="text-align: center; margin-bottom: 2rem;">系統登入</h2>
    
    {% if form.errors %}
        <p style="color: #d9534f; font-size: 0.9rem; margin-bottom: 1rem; text-align: center;">帳號或密碼錯誤，請重試。</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label for="id_username" style="display: block; margin-bottom: 0.5rem; color: var(--text-light); font-size: 0.9rem;">帳號 (Email/學號)</label>
            <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
        </div>
        
        <div style="margin-bottom: 2rem;">
            <label for="id_password" style="display: block; margin-bottom: 0.5rem; color: var(--text-light); font-size: 0.9rem;">密碼</label>
            <input type="password" name="password" autocomplete="current-password" required id="id_password" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; padding: 1rem;">登入</button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock %}
