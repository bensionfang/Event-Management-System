{% extends 'base.html' %}

{% block title %}報名成功 | {{ registration.event.title }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; text-align: center; padding: 3rem 2rem;">
    <div style="font-size: 4rem; color: #28a745; margin-bottom: 1rem;">✓</div>
    <h2 style="font-size: 2rem; margin-bottom: 1rem;">報名成功！</h2>
    <p style="color: var(--text-light); font-size: 1.1rem; margin-bottom: 2rem;">您已成功報名 <strong>{{ registration.event.title }}</strong></p>
    
    <div style="background-color: var(--bg-body); padding: 2rem; border-radius: var(--radius); margin-bottom: 2rem; display: inline-block; border: 1px solid var(--border-color);">
        <h4 style="margin-top: 0; margin-bottom: 1rem; color: var(--text-color);">您的簽到專屬 QR Code</h4>
        <!-- 這裡會放QR Code，後續我們可以串接 qrcode.js 產生圖片 -->
        <div id="qrcode" style="display: flex; justify-content: center;"></div>
        <p style="margin-top: 1rem; margin-bottom: 0; font-size: 0.9rem; color: var(--text-light);">請截圖保存，活動當天出示此條碼進行簽到</p>
        <p style="margin-top: 0.5rem; margin-bottom: 0; font-size: 0.8rem; color: var(--text-light);">報名信箱：{{ registration.email }}</p>
    </div>

    <div>
        <a href="{% url 'events:detail' registration.event.id %}" class="btn btn-outline" style="text-decoration: none; display: inline-block;">返回活動頁面</a>
        <a href="{% url 'events:list' %}" class="btn" style="text-decoration: none; display: inline-block; margin-left: 1rem;">看更多活動</a>
    </div>
</div>

<!-- 引入 qrcode.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var checkInUrl = window.location.origin + "{% url 'events:check_in_by_qr' registration.check_in_id %}";
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: checkInUrl,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    });
</script>
{% endblock %}
