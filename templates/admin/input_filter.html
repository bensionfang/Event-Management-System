{% load i18n %}
<div class="custom-filter-section" style="margin-bottom: 20px;">
    {% if title != '資源回收桶' %}
    <h3 style="font-size: 0.95rem; font-weight: bold; margin-bottom: 10px; color: var(--body-fg);">
        📍 依「{{ title }}」搜尋
    </h3>
    {% endif %}
    <div style="padding: 0 10px;">
        <form method="GET" action="">
            {# Keep other query string parameters #}
            {% for k, v in choices.0.query_parts %}
                <input type="hidden" name="{{ k }}" value="{{ v }}">
            {% endfor %}
            <input type="text"
                   name="{{ spec.parameter_name }}"
                   value="{{ spec.value|default_if_none:'' }}"
                   placeholder="輸入{{ title }}..."
                   style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; margin-bottom: 5px;">
            <div style="display: flex; gap: 5px;">
                <button type="submit" style="flex: 1; padding: 5px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">搜尋</button>
                {% if spec.value %}
                <a href="{{ choices.0.query_string }}" style="flex: 1; padding: 5px; background: #eaeaea; color: #333; text-decoration: none; text-align: center; border-radius: 4px; font-size: 0.85rem; display: inline-block;">清除</a>
                {% endif %}
            </div>
        </form>
    </div>
</div>
