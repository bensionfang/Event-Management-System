{% extends "admin/change_list.html" %}
{% load i18n admin_list %}

{% block filters %}
  {% if cl.has_filters %}
    <div id="changelist-filter" style="background-color: var(--body-bg); border-left: 1px solid var(--border-color); border-radius: 0 8px 8px 0; padding: 12px;">
      <h2 style="font-size: 1rem; font-weight: bold; margin-bottom: 15px; color: #fff; background-color: var(--primary); padding: 8px 10px; border-radius: 4px; text-align: center;">
        🔍 快速資料篩選
      </h2>
      
      {% if cl.has_active_filters %}
        <h3 id="changelist-filter-clear" style="margin-bottom: 20px; text-align: center;">
          <a href="{{ cl.clear_all_filters_qs }}" style="color: #d9534f; text-decoration: none; font-size: 0.9rem; font-weight: bold;">
            ✖ 清除所有篩選條件
          </a>
        </h3>
      {% endif %}
      
      {% for spec in cl.filter_specs %}
        {% admin_list_filter cl spec %}
      {% endfor %}
    </div>
  {% endif %}
{% endblock %}
